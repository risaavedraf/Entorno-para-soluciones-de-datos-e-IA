name: CD - Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: python -m pytest tests/ -v
      - name: Model Performance Gate
        run: |
          python -c "
          import json
          from pathlib import Path
          meta_path = Path('models/metadata.json')
          if not meta_path.exists():
              print('No metadata.json found, skipping model performance gate')
              exit(0)
          meta = json.loads(meta_path.read_text())
          r2 = meta.get('r2_score', meta.get('r2', 0))
          assert r2 >= 0.85, f'R² {r2} below threshold 0.85'
          print('Model performance gate PASSED')
          "

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        # User must set RENDER_DEPLOY_HOOK in GitHub Secrets
